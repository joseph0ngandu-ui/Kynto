services:
  dashboard-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - /run/user/1000/docker.sock:/var/run/docker.sock
      - auth_data:/app/data
    ports:
      - "3001:3001"
    networks:
      - dashboard_net
      - kynto_kynto_internal
    restart: always
    healthcheck:
      test: [ "CMD", "node", "-e", "require('net').createConnection(3001,'localhost').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 12s

  dashboard-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
      - "3443:443"
    networks:
      - dashboard_net
    depends_on:
      dashboard-backend:
        condition: service_healthy
    restart: always
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost/" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  auth_data:


networks:
  dashboard_net:
    driver: bridge
  kynto_kynto_internal:
    external: true
