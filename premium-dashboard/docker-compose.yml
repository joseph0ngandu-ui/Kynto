services:
  dashboard-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - /run/user/1000/docker.sock:/var/run/docker.sock
      - auth_data:/app/data
    ports:
      - "3001:3001"
    networks:
      - dashboard_net
      - kynto_kynto_internal
    restart: always

  dashboard-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    networks:
      - dashboard_net
    depends_on:
      - dashboard-backend
    restart: always

volumes:
  auth_data:


networks:
  dashboard_net:
    driver: bridge
  kynto_kynto_internal:
    external: true
