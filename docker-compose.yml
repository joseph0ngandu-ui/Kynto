services:
  gateway_service:
    build: ./gateway_service
    env_file: .env
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      - ./gateway_service:/app
      - ./media_sandbox:/tmp/kynto_media
    networks:
      - kynto_stack_net
    restart: unless-stopped
    healthcheck:
      # Slack SocketMode bot — no HTTP server; confirm process PID 1 is alive
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s

  openclaw:
    image: alpine/openclaw:latest
    env_file: .env
    command: ["node", "openclaw.mjs", "gateway", "--allow-unconfigured", "--bind", "lan", "--port", "18889"]
    volumes:
      - ./.openclaw:/home/node/.openclaw
      - ./agent_workspace:/home/node/openclaw/workspace
    networks:
      - kynto_stack_net
    depends_on:
      docker_mcp_bridge:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "openclaw", "gateway", "status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  docker_mcp_bridge:
    build: ./docker_mcp_bridge
    volumes:
      - /run/user/1000/docker.sock:/var/run/docker.sock
      - ./logs/audit_trail.log:/var/log/kynto_audit.log
      - ./agent_workspace:/workspace
    environment:
      - ALLOWED_ACTIONS=list,logs,restart,start,stop
      - ENFORCE_APPEND_ONLY_LOGS=true
    networks:
      - kynto_stack_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/system/info"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  kynto_stack_net:
    driver: bridge
    name: kynto_stack_net
